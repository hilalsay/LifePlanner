<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <!-- PWA -->
    <meta name="theme-color" content="#6366f1" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Life Planner" />

    <!-- Primary SEO -->
    <title>Life Planner — Plan your life from vision to daily tasks</title>
    <meta name="description" content="AI-powered life planning app with AIzen, your personal AI coach. Plan everything from big life goals to daily habits, mood, health and books." />
    <meta name="keywords" content="life planner, habit tracker, goal setting, AI assistant, daily planner, productivity" />
    <link rel="canonical" href="https://lifeplanner.hilalsay.com.tr" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Life Planner — Plan your life with AI" />
    <meta property="og:description" content="From big life goals to daily tasks — all connected. With AIzen, your personal AI coach." />
    <meta property="og:url" content="https://lifeplanner.hilalsay.com.tr" />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="https://lifeplanner.hilalsay.com.tr/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Life Planner — Plan your life with AI" />
    <meta name="twitter:description" content="From big life goals to daily tasks — all connected. With AIzen, your personal AI coach." />
    <meta name="twitter:image" content="https://lifeplanner.hilalsay.com.tr/og-image.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "Life Planner",
      "description": "AI-powered life planning app",
      "url": "https://lifeplanner.hilalsay.com.tr",
      "applicationCategory": "ProductivityApplication",
      "operatingSystem": "Web, PWA",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
