version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: life_planner_db
    environment:
      POSTGRES_USER: lifeplanner
      POSTGRES_PASSWORD: lifeplanner123
      POSTGRES_DB: life_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeplanner -d life_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
